         puh:"直接または間接の高い方に注目するか、NMAでダウン。"}
    ],
    recommendation:"Izcovich方式の判定フローが最も体系的。非整合性がない大多数のケースではNMA推定値を採用。非整合性がある場合のみA2/B3を実施し比較。",
    caution:"例4（Bognanni et al.）のように、直接と間接で効果の方向が逆転する場合はNMA確実性が大きく低下し、直接推定値の方が適切な場合がある。"
},
{
    id:"efficiency", step:"全体", stepClass:"step-a",
    title:"効率化ルール",
    comparisons:[
        {aspect:"間接評価の省略",
         izc:"直接COE=高 & 直接が支配的 → 間接評価不要",
         kam:"同様の原則を適用",
         brg:"「直接の確実性が高く、直接の寄与が間接以上なら間接の評価は不要」（2018, Sec 3.2）",
         puh:"言及なし（初期ガイダンス）"},
        {aspect:"A2/B3の省略",
         izc:"非整合性なし & NMAがより精確 → A2/B3不要。非整合性あり時のみ実施。スプレッドシートが自動通知。",
         kam:"同様",
         brg:"「直接・間接の不精確さ評価は通常不要」（2018, Sec 3.1）",
         puh:"省略の言及なし"}
    ],
    recommendation:"大規模NMAでは効率化ルールの活用が不可欠。特にA2/B3の省略は作業量を大幅に削減できる。",
    caution:"省略ルールを適用する前に、直接エビデンスの寄与度を必ず確認すること。"
},
{
    id:"livingsr", step:"全体", stepClass:"step-d",
    title:"リビングSR対応",
    comparisons:[
        {aspect:"更新プロセス",
         izc:"スプレッドシートのStatus列で「新規」「更新」を自動表示。前回評価を引き継ぎ。(Supp file 4)",
         kam:"リビングNMAで開発・検証。明確なルールにより時間経過でも一貫した判定。",
         brg:"言及なし（リビングSR以前のガイダンス）",
         puh:"言及なし"},
        {aspect:"再評価の深度",
         izc:"追加エビデンス量に応じて決定。新規=フル評価、少量追加=軽微な見直し。",
         kam:"自動判定により再評価が効率的。ルール変更時は全比較の再計算が必要。",
         brg:"N/A",
         puh:"N/A"}
    ],
    recommendation:"リビングSRではKamso方式の明確なルール設定が特に有効。時間経過でチームが変わっても一貫した判定が可能。",
    caution:"新エビデンスの追加により、以前の確実性が変わる可能性がある。特に直接比較の追加は間接・NMA推定値にも波及する。"
}
];

// ===== USER CHOICES =====
let userChoices = {};

// ===== RENDER =====
function renderTOC(){
    document.getElementById('tocList').innerHTML = SECTIONS.map(s =>
        `<a class="toc-item" onclick="scrollToSection('${s.id}')"><span class="step-tag ${s.stepClass}">${s.step}</span> ${s.title}</a>`
    ).join('');
}

function renderMain(){
    document.getElementById('mainContent').innerHTML = SECTIONS.map(s => {
        const rows = s.comparisons.map(c => `
            <tr>
                <td class="font-bold">${c.aspect}</td>
                <td>${c.izc||'—'}</td>
                <td>${c.kam||'—'}</td>
                <td>${c.brg||'—'}</td>
                <td>${c.puh||'—'}</td>
            </tr>
        `).join('');

        return `
        <div class="ref-card" id="section-${s.id}">
            <div class="ref-header" onclick="toggleRef('${s.id}')">
                <span class="step-tag ${s.stepClass}">${s.step}</span>
                <div class="flex-1 font-bold text-sm">${s.title}</div>
                <span class="text-gray-400" id="arrow-${s.id}">▼</span>
            </div>
            <div class="ref-body active" id="refbody-${s.id}">
                <table class="comp-table">
                    <thead><tr>
                        <th style="width:15%">観点</th>
                        <th style="width:22%"><span class="src-tag src-izc">Izcovich 2023</span></th>
                        <th style="width:22%"><span class="src-tag src-kam">Kamso 2026</span></th>
                        <th style="width:22%"><span class="src-tag src-brg">Brignardello-P.</span></th>
                        <th style="width:19%"><span class="src-tag src-puh">Puhan 2014</span></th>
                    </tr></thead>
                    <tbody>${rows}</tbody>
                </table>

                <div class="recommend">
                    <h5>✅ 推奨アプローチ</h5>
                    <p>${s.recommendation}</p>
                </div>

                ${s.caution ? `<div class="caution"><h5>⚠️ 注意点</h5><p>${s.caution}</p></div>` : ''}

                <div class="choice-box">
                    <h5>🔧 あなたのプロジェクトでの採用方式</h5>
                    <div class="choice-radio">
                        <label><input type="radio" name="choice-${s.id}" value="izcovich" onchange="saveChoice('${s.id}','izcovich')" ${userChoices[s.id]==='izcovich'?'checked':''}> <span>Izcovich方式</span></label>
                        <label><input type="radio" name="choice-${s.id}" value="kamso" onchange="saveChoice('${s.id}','kamso')" ${userChoices[s.id]==='kamso'?'checked':''}> <span>Kamso方式</span></label>
                        <label><input type="radio" name="choice-${s.id}" value="brignardello" onchange="saveChoice('${s.id}','brignardello')" ${userChoices[s.id]==='brignardello'?'checked':''}> <span>Brignardello-P.方式</span></label>
                        <label><input type="radio" name="choice-${s.id}" value="custom" onchange="saveChoice('${s.id}','custom')" ${userChoices[s.id]==='custom'?'checked':''}> <span>カスタム</span></label>
                    </div>
                    <textarea class="w-full mt-2 p-2 border rounded text-xs" rows="2" placeholder="カスタムの場合のメモ" id="note-${s.id}" oninput="saveNote('${s.id}',this.value)">${userChoices[s.id+'_note']||''}</textarea>
                </div>
            </div>
        </div>`;
    }).join('');
}

function toggleRef(id){
    const body = document.getElementById(`refbody-${id}`);
    const arrow = document.getElementById(`arrow-${id}`);
    if(body.classList.contains('active')){
        body.classList.remove('active');
        body.style.display='none';
        arrow.textContent='▶';
    } else {
        body.classList.add('active');
        body.style.display='block';
        arrow.textContent='▼';
    }
}

function scrollToSection(id){
    const el = document.getElementById(`section-${id}`);
    if(el){
        el.scrollIntoView({behavior:'smooth',block:'start'});
        const body = document.getElementById(`refbody-${id}`);
        if(!body.classList.contains('active')){
            body.classList.add('active');
            body.style.display='block';
            document.getElementById(`arrow-${id}`).textContent='▼';
        }
    }
}

function saveChoice(id, value){
    userChoices[id] = value;
    localStorage.setItem('nmaGradeChoices', JSON.stringify(userChoices));
}

function saveNote(id, value){
    userChoices[id+'_note'] = value;
    localStorage.setItem('nmaGradeChoices', JSON.stringify(userChoices));
}

function exportChoices(){
    const data = JSON.stringify(userChoices, null, 2);
    const blob = new Blob([data], {type:'application/json'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'nma_grade_method_choices.json';
    a.click();
}

function loadChoices(){
    const saved = localStorage.getItem('nmaGradeChoices');
    if(saved) userChoices = JSON.parse(saved);
}

// ===== INIT =====
document.addEventListener('DOMContentLoaded', () => {
    loadChoices();
    renderTOC();
    renderMain();
});
</script>
</body>
</html>
